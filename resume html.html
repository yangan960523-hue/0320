<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>履歷</title>

<style>
body {
    margin: 0;
    font-family: "Segoe UI", "微軟正黑體";
    background: linear-gradient(135deg, #e0f2fe, #f0f9ff);
}

/* 卡片 */
.resume {
    max-width: 1000px;
    margin: 40px auto;
    display: flex;
    border-radius: 20px;
    overflow: hidden;
    box-shadow: 0 25px 60px rgba(0,0,0,0.15);
}

/* 左側 */
.left {
    width: 35%;
    background: linear-gradient(180deg, #7dd3fc, #38bdf8);
    color: white;
    padding: 30px;
    position: relative;
}

/* 圓形背景裝飾 */
.left::before {
    content: "";
    position: absolute;
    top: -50px;
    right: -50px;
    width: 200px;
    height: 200px;
    background: rgba(255,255,255,0.2);
    border-radius: 50%;
}

.left::after {
    content: "";
    position: absolute;
    bottom: -60px;
    left: -60px;
    width: 180px;
    height: 180px;
    background: rgba(255,255,255,0.15);
    border-radius: 50%;
}

/* 頭像 */
.left img {
    width: 120px;
    border-radius: 50%;
    border: 4px solid white;
    margin-bottom: 15px;
    z-index: 1;
    position: relative;
}

.left h1 {
    margin: 10px 0;
}

/* 標題 */
.section-title {
    margin-top: 25px;
    font-weight: bold;
    letter-spacing: 1px;
    opacity: 0.9;
}

/* 右側 */
.right {
    width: 65%;
    background: white;
    padding: 40px;
    position: relative;
}

/* blob裝飾 */
.right::before {
    content: "";
    position: absolute;
    top: 0;
    right: 0;
    width: 300px;
    height: 200px;
    background: #7dd3fc;
    border-bottom-left-radius: 100px;
    opacity: 0.3;
}

/* 區塊 */
.block {
    margin-bottom: 30px;
}

.block h2 {
    color: #38bdf8;
    margin-bottom: 10px;
}

/* 技能圓圈 */
.skill-circle {
    display: flex;
    align-items: center;
    margin: 12px 0;
}

.circle {
    width: 45px;
    height: 45px;
    border-radius: 50%;
    border: 4px solid #bae6fd;
    border-top: 4px solid #38bdf8;
    margin-right: 10px;
}

/* 音樂按鈕 */
#musicBtn {
    margin-top: 10px;
    padding: 6px 12px;
    border: none;
    border-radius: 20px;
    background: white;
    color: #38bdf8;
    cursor: pointer;
}

/* 文字細節 */
p {
    line-height: 1.6;
    color: #374151;
}

.left p {
    color: white;
}
</style>
</head>

<body>

<div class="resume">

    <!-- 左側 -->
    <div class="left">
        <img src="images/profile.jpg">

        <h1 id="name"></h1>
        <p>亞洲大學學生</p>

        <button onclick="toggleMusic()" id="musicBtn">▶ 音樂</button>

        <div class="section-title">PROFILE</div>
        <p>
            喜歡設計與程式，持續探索不同領域，
            讓生活與創作結合。
        </p>

        <div class="section-title">CONTACT</div>
        <p>Email: yangan960523@gmail.com</p>

        <div class="section-title">HOBBY</div>
        <p>🍜 美食</p>
        <p>🎬 追劇</p>
        <p>🎵 音樂</p>
        <p>📸 攝影</p>
    </div>

    <!-- 右側 -->
    <div class="right">

        <div class="block">
            <h2>ABOUT ME</h2>
            <p>
                我喜歡探索不同餐廳與文化，
                並透過設計與程式創造屬於自己的作品。
            </p>
        </div>

        <div class="block">
            <h2>SKILLS</h2>

            <div class="skill-circle">
                <div class="circle"></div> HTML
            </div>

            <div class="skill-circle">
                <div class="circle"></div> CSS
            </div>

            <div class="skill-circle">
                <div class="circle"></div> JavaScript
            </div>

            <div class="skill-circle">
                <div class="circle"></div> Python
            </div>

        </div>

        <div class="block">
            <h2>EXPERIENCE</h2>
            <p>2024 - 專題製作</p>
            <p>2023 - 網頁設計作品</p>
        </div>

        <div class="block">
            <h2>FUTURE GOAL</h2>
            <p>
                成為結合設計與技術的前端工程師，
                打造有溫度的產品。
            </p>
        </div>

    </div>
</div>

<!-- 音樂 -->
<audio id="bgm" loop>
  <source src="mp3/bg.mp3" type="audio/mpeg">
</audio>

<script>
// 打字效果
const text = "Annie";
let i = 0;
function typeEffect() {
    if (i < text.length) {
        document.getElementById("name").innerText += text[i];
        i++;
        setTimeout(typeEffect, 100);
    }
}
typeEffect();

// 音樂
const audio = document.getElementById("bgm");
const btn = document.getElementById("musicBtn");

function toggleMusic() {
    if (audio.paused) {
        audio.play();
        btn.innerText = "⏸";
    } else {
        audio.pause();
        btn.innerText = "▶";
    }
}
</script>

</body>
</html>
