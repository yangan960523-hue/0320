<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>履歷</title>

<style>
body {
    margin: 0;
    font-family: "Segoe UI", "微軟正黑體";
    background: #e0f2fe;
}

/* 主卡片 */
.resume {
    max-width: 1100px;
    margin: 40px auto;
    display: flex;
    border-radius: 25px;
    overflow: hidden;
    box-shadow: 0 30px 70px rgba(0,0,0,0.15);
}

/* 左側 */
.left {
    width: 40%;
    background: #7dd3fc;
    color: white;
    padding: 40px 30px;
    position: relative;
}

/* 大圓弧 */
.left::after {
    content: "";
    position: absolute;
    right: -150px;
    top: 200px;
    width: 400px;
    height: 400px;
    background: white;
    border-radius: 50%;
}

/* 頭像（放大重點） */
.left img {
    width: 200px;
    height: 200px;
    object-fit: cover;
    border-radius: 50%;
    border: 8px solid white;
    display: block;
    margin: 0 auto 20px;
    position: relative;
    z-index: 2;
}

/* 名字 */
.left h1 {
    text-align: center;
    margin: 10px 0;
}

/* 區塊 */
.section-title {
    margin-top: 30px;
    font-weight: bold;
    font-size: 18px;
}

/* 語言條 */
.bar {
    height: 6px;
    background: rgba(255,255,255,0.4);
    border-radius: 10px;
    margin: 5px 0 10px;
}

.bar span {
    display: block;
    height: 100%;
    background: white;
    border-radius: 10px;
}

/* 右側 */
.right {
    width: 60%;
    background: white;
    padding: 50px;
    position: relative;
}

/* 上方大圓 */
.right::before {
    content: "";
    position: absolute;
    top: -150px;
    right: -150px;
    width: 400px;
    height: 400px;
    background: #7dd3fc;
    border-radius: 50%;
    opacity: 0.3;
}

/* 標題 */
.block {
    margin-bottom: 40px;
}

.block h2 {
    color: #38bdf8;
    margin-bottom: 10px;
}

/* 技能圓圈 */
.skills {
    display: flex;
    gap: 20px;
}

.circle {
    width: 70px;
    height: 70px;
    border-radius: 50%;
    border: 6px solid #e0f2fe;
    border-top: 6px solid #38bdf8;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: bold;
}

/* 經驗 */
.exp-item {
    margin-bottom: 20px;
}

.exp-item strong {
    color: #0ea5e9;
}

/* 音樂按鈕 */
#musicBtn {
    margin-top: 15px;
    padding: 6px 12px;
    border: none;
    border-radius: 20px;
    background: white;
    color: #38bdf8;
    cursor: pointer;
}

/* 文字 */
p {
    line-height: 1.6;
}
</style>
</head>

<body>

<div class="resume">

    <!-- 左 -->
    <div class="left">
        <img src="images/profile.jpg">

        <h1 id="name"></h1>
        <p style="text-align:center;">亞洲大學學生</p>

        <button onclick="toggleMusic()" id="musicBtn">▶ 音樂</button>

        <div class="section-title">語言</div>

        英文
        <div class="bar"><span style="width:80%"></span></div>

        中文
        <div class="bar"><span style="width:100%"></span></div>

        日文
        <div class="bar"><span style="width:50%"></span></div>

        <div class="section-title">興趣</div>
        <p>🎵 音樂</p>
        <p>📸 攝影</p>
        <p>🍜 美食</p>

    </div>

    <!-- 右 -->
    <div class="right">

        <div class="block">
            <h2>介紹</h2>
            <p>
                我熱愛設計與程式，喜歡將創意轉化為實際作品，
                並持續提升自己的前端能力。
            </p>
        </div>

        <div class="block">
            <h2>技能</h2>
            <div class="skills">
                <div class="circle">HTML</div>
                <div class="circle">CSS</div>
                <div class="circle">JS</div>
                <div class="circle">PY</div>
            </div>
        </div>

        <div class="block">
            <h2>經驗</h2>

            <div class="exp-item">
                <strong>2024</strong> 專題製作
                <p>開發個人網站與UI設計</p>
            </div>

            <div class="exp-item">
                <strong>2023</strong> 網頁作品
                <p>完成多個前端練習專案</p>
            </div>

        </div>

        <div class="block">
            <h2>聯絡我</h2>
            <p>Email: yangan960523@gmail.com</p>
        </div>

    </div>

</div>

<!-- 音樂 -->
<audio id="bgm" loop>
  <source src="mp3/bg.mp3" type="audio/mpeg">
</audio>

<script>
// 打字效果
const text = "Annie";
let i = 0;
function typeEffect() {
    if (i < text.length) {
        document.getElementById("name").innerText += text[i];
        i++;
        setTimeout(typeEffect, 100);
    }
}
typeEffect();

// 音樂
const audio = document.getElementById("bgm");
const btn = document.getElementById("musicBtn");

function toggleMusic() {
    if (audio.paused) {
        audio.play();
        btn.innerText = "⏸";
    } else {
        audio.pause();
        btn.innerText = "▶";
    }
}
</script>

</body>
</html>
