<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>履歷</title>

<style>
body {
    margin: 0;
    font-family: "Segoe UI", "微軟正黑體";
    background: linear-gradient(135deg, #e0f2fe, #f8fafc);
}

/* 外框 */
.resume {
    max-width: 1100px;
    margin: 40px auto;
    display: flex;
    border-radius: 25px;
    overflow: hidden;
    box-shadow: 0 25px 60px rgba(0,0,0,0.12);
    transition: 0.3s;
    background: white;
}

/* 左側 */
.left {
    width: 38%;
    background: linear-gradient(180deg, #7dd3fc, #38bdf8);
    color: white;
    padding: 40px 30px;
}

/* 頭像 */
.left img {
    width: 170px;
    height: 170px;
    object-fit: cover;
    border-radius: 50%;
    border: 5px solid white;
    display: block;
    margin: 0 auto 15px;
}

/* 名字 */
.left h1 {
    text-align: center;
    margin: 10px 0 5px;
}

/* 學號 */
.student-id {
    text-align: center;
    font-size: 14px;
    opacity: 0.9;
}

/* 區塊標題 */
.section-title {
    margin-top: 25px;
    font-weight: bold;
    font-size: 16px;
}

/* 語言條 */
.bar {
    height: 7px;
    background: rgba(255,255,255,0.25);
    border-radius: 20px;
    margin: 5px 0 12px;
    overflow: hidden;
}

.bar span {
    display: block;
    height: 100%;
    background: white;
    border-radius: 20px;
    width: 0;
    animation: fillBar 2s ease forwards;
}

@keyframes fillBar {
    to { width: var(--width); }
}

/* 右側 */
.right {
    width: 62%;
    padding: 45px;
    background: #ffffff;
}

.block {
    margin-bottom: 35px;
}

.block h2 {
    color: #0ea5e9;
    margin-bottom: 10px;
}

/* 技能 */
.skills {
    display: flex;
    gap: 15px;
    flex-wrap: wrap;
}

.circle {
    width: 70px;
    height: 70px;
    border-radius: 50%;
    border: 5px solid #e0f2fe;
    border-top: 5px solid #38bdf8;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: bold;
    animation: spin 6s linear infinite;
}

@keyframes spin {
    100% { transform: rotate(360deg); }
}

/* 按鈕 */
#musicBtn {
    margin-top: 15px;
    padding: 12px;
    border: none;
    border-radius: 30px;
    background: white;
    color: #38bdf8;
    width: 100%;
    font-weight: bold;
    cursor: pointer;
}

.copy-btn {
    margin-top: 10px;
    padding: 10px;
    border: none;
    border-radius: 20px;
    background: #38bdf8;
    color: white;
    width: 100%;
    cursor: pointer;
}

/* =========================
   📱 手機版 RWD
========================= */
@media (max-width: 768px) {

    .resume {
        flex-direction: column;
        margin: 15px;
    }

    .left, .right {
        width: 100%;
        padding: 25px;
    }

    .left img {
        width: 140px;
        height: 140px;
    }

    .right {
        padding: 25px;
    }

    .skills {
        justify-content: center;
    }

    .circle {
        width: 60px;
        height: 60px;
        font-size: 14px;
    }
}

p {
    line-height: 1.6;
}
</style>
</head>

<body>

<div class="resume">

    <!-- 左 -->
    <div class="left">
        <img src="images/profile.jpg">

        <h1 id="name"></h1>
        <div class="student-id">學號 114018026</div>

        <p style="text-align:center;">亞洲大學學生</p>

        <button onclick="toggleMusic()" id="musicBtn">▶ 播放音樂</button>

        <div class="section-title">語言</div>

        英文
        <div class="bar">
            <span style="--width:80%"></span>
        </div>

        中文
        <div class="bar">
            <span style="--width:100%"></span>
        </div>

        <div class="section-title">興趣</div>
        <p>🎵 音樂</p>
        <p>📸 攝影</p>
        <p>🍜 美食</p>
        <p>✈️ 旅遊</p>
        <p>🧵 手作</p>
    </div>

    <!-- 右 -->
    <div class="right">

        <div class="block">
            <h2>介紹</h2>
            <p>
                我是楊紫安，目前就讀亞洲大學，對設計與程式充滿熱情。
                喜歡從生活中找靈感，把想法做成作品。
                個性細心、有耐心，喜歡一步一步完成事情。
            </p>
        </div>

        <div class="block">
            <h2>技能</h2>
            <div class="skills">
                <div class="circle">HTML</div>
                <div class="circle">CSS</div>
                <div class="circle">JS</div>
                <div class="circle">PY</div>
            </div>
        </div>

        <div class="block">
            <h2>經驗</h2>
            <p><strong>2024</strong> 專題製作</p>
            <p><strong>2023</strong> 網頁作品</p>
        </div>

        <div class="block">
            <h2>聯絡我</h2>
            <p id="email">yangan960523@gmail.com</p>
            <button class="copy-btn" onclick="copyEmail()">📋 複製Email</button>
        </div>

    </div>

</div>

<audio id="bgm" loop>
  <source src="mp3/bg.mp3" type="audio/mpeg">
</audio>

<script>
const text = "楊紫安";
let i = 0;

function typeEffect() {
    if (i < text.length) {
        document.getElementById("name").innerText += text[i];
        i++;
        setTimeout(typeEffect, 120);
    }
}
typeEffect();

const audio = document.getElementById("bgm");
const btn = document.getElementById("musicBtn");

function toggleMusic() {
    if (audio.paused) {
        audio.play();
        btn.innerText = "⏸ 暫停音樂";
    } else {
        audio.pause();
        btn.innerText = "▶ 播放音樂";
    }
}

function copyEmail() {
    const email = document.getElementById("email").innerText;
    navigator.clipboard.writeText(email);
    alert("已複製 Email！");
}
</script>

</body>
</html>
