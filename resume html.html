<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>履歷</title>

<style>
body {
    margin: 0;
    font-family: "Segoe UI", "微軟正黑體";
    background: #e0f2fe;
}

/* 卡片 */
.resume {
    max-width: 1100px;
    margin: 40px auto;
    display: flex;
    border-radius: 25px;
    overflow: hidden;
    box-shadow: 0 30px 70px rgba(0,0,0,0.15);
    transition: all 0.3s ease;
}

.resume:hover {
    transform: translateY(-10px);
    box-shadow: 0 40px 90px rgba(0,0,0,0.2);
}

/* 左側 */
.left {
    width: 40%;
    background: #7dd3fc;
    color: white;
    padding: 40px 30px;
    position: relative;
}

.left::after {
    content: "";
    position: absolute;
    right: -150px;
    top: 200px;
    width: 400px;
    height: 400px;
    background: white;
    border-radius: 50%;
}

.left img {
    width: 200px;
    height: 200px;
    object-fit: cover;
    border-radius: 50%;
    border: 8px solid white;
    display: block;
    margin: 0 auto 20px;
    position: relative;
    z-index: 2;
}

/* 名字 */
.left h1 {
    text-align: center;
    margin: 10px 0;
    color: black;
}

/* 區塊 */
.section-title {
    margin-top: 30px;
    font-weight: bold;
    font-size: 18px;
}

/* 語言條（動畫） */
.bar {
    height: 6px;
    background: rgba(255,255,255,0.4);
    border-radius: 10px;
    margin: 5px 0 15px;
    overflow: hidden;
}

.bar span {
    display: block;
    height: 100%;
    background: white;
    border-radius: 10px;
    width: 0;
    animation: fillBar 2s ease forwards;
}

/* 動畫 */
@keyframes fillBar {
    from { width: 0; }
    to { width: var(--width); }
}

/* 右側 */
.right {
    width: 60%;
    background: white;
    padding: 50px;
    position: relative;
}

.right::before {
    content: "";
    position: absolute;
    top: -150px;
    right: -150px;
    width: 400px;
    height: 400px;
    background: #7dd3fc;
    border-radius: 50%;
    opacity: 0.3;
}

.block {
    margin-bottom: 40px;
}

.block h2 {
    color: #38bdf8;
}

/* 技能 */
.skills {
    display: flex;
    gap: 20px;
}

.circle {
    width: 70px;
    height: 70px;
    border-radius: 50%;
    border: 6px solid #e0f2fe;
    border-top: 6px solid #38bdf8;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: bold;
    animation: spin 4s linear infinite;
}

.circle:hover {
    animation: spin 1s linear infinite;
}

@keyframes spin {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
}

/* 按鈕 */
#musicBtn {
    margin-top: 20px;
    padding: 12px 20px;
    font-size: 16px;
    border: none;
    border-radius: 30px;
    background: white;
    color: #38bdf8;
    cursor: pointer;
    width: 100%;
}

.copy-btn {
    margin-top: 10px;
    padding: 8px;
    border: none;
    border-radius: 20px;
    background: #38bdf8;
    color: white;
    cursor: pointer;
    width: 100%;
}

p {
    line-height: 1.6;
}
</style>
</head>

<body>

<div class="resume">

    <!-- 左 -->
    <div class="left">
        <img src="images/profile.jpg">

        <h1 id="name"></h1>
        <p style="text-align:center;">亞洲大學學生</p>

        <button onclick="toggleMusic()" id="musicBtn">▶ 播放音樂</button>

        <div class="section-title">語言</div>

        英文
        <div class="bar">
            <span style="--width:80%"></span>
        </div>

        中文
        <div class="bar">
            <span style="--width:100%"></span>
        </div>

        <div class="section-title">興趣</div>
        <p>🎵 音樂</p>
        <p>📸 攝影</p>
        <p>🍜 美食</p>
        <p>✈️ 旅遊</p>
        <p>🧵 手作</p>
    </div>

    <!-- 右 -->
    <div class="right">

        <div class="block">
            <h2>介紹</h2>
            <p>
                我是楊紫安，目前就讀亞洲大學，對設計與程式充滿熱情，
                喜歡將創意轉化為實際作品。
            </p>
            <p>
                平時熱愛旅遊，探索不同文化與生活方式，從中獲得靈感；
                也喜歡手作與攝影，透過創作表達想法。
            </p>
            <p>
                此外，我持續精進前端開發技能，希望未來能結合設計與技術，
                打造具有溫度與良好使用體驗的作品。
            </p>
        </div>

        <div class="block">
            <h2>技能</h2>
            <div class="skills">
                <div class="circle">HTML</div>
                <div class="circle">CSS</div>
                <div class="circle">JS</div>
                <div class="circle">PY</div>
            </div>
        </div>

        <div class="block">
            <h2>經驗</h2>
            <p><strong>2024</strong> 專題製作</p>
            <p><strong>2023</strong> 網頁作品</p>
        </div>

        <div class="block">
            <h2>聯絡我</h2>
            <p id="email">yangan960523@gmail.com</p>
            <button class="copy-btn" onclick="copyEmail()">📋 複製Email</button>
        </div>

    </div>

</div>

<audio id="bgm" loop>
  <source src="mp3/bg.mp3" type="audio/mpeg">
</audio>

<script>
// 打字效果
const text = "楊紫安";
let i = 0;
function typeEffect() {
    if (i < text.length) {
        document.getElementById("name").innerText += text[i];
        i++;
        setTimeout(typeEffect, 120);
    }
}
typeEffect();

// 音樂
const audio = document.getElementById("bgm");
const btn = document.getElementById("musicBtn");

function toggleMusic() {
    if (audio.paused) {
        audio.play();
        btn.innerText = "⏸ 暫停音樂";
    } else {
        audio.pause();
        btn.innerText = "▶ 播放音樂";
    }
}

// 複製Email
function copyEmail() {
    const email = document.getElementById("email").innerText;
    navigator.clipboard.writeText(email);
    alert("已複製 Email！");
}
</script>

</body>
</html>
